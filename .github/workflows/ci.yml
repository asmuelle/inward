name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    # macos-26 ships Xcode 26 / the iOS 26 SDK that the app target (and
    # SpeechTranscriber/FoundationModels guards) require; macos-15 does not.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v3

      - name: Install Swift tooling
        run: brew install swiftformat swiftlint

      - name: Check bootstrap status
        id: guard
        run: |
          if [ -f project.yml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::project.yml not found — docs-only scaffold; skipping bootstrap/lint/build/test (see DESIGN.md M0)."
          fi

      - name: Bootstrap (xcodegen + SPM resolve)
        if: steps.guard.outputs.bootstrapped == 'true'
        run: |
          brew install xcodegen
          just bootstrap

      - name: Lint, build, test
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
