name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo — it never writes contents, statuses,
# PRs, or packages. Restricts the GITHUB_TOKEN (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  ci:
    # macos-26 ships Xcode 26 / the iOS 26 SDK that the app target (and
    # SpeechTranscriber/FoundationModels guards) require; macos-15 does not.
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - uses: extractions/setup-just@v4

      - name: Install Swift tooling
        run: brew install swiftformat swiftlint

      - name: Check bootstrap status
        id: guard
        run: |
          if [ -f project.yml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::project.yml not found — docs-only scaffold; skipping bootstrap/lint/build/test (see DESIGN.md M0)."
          fi

      - name: Bootstrap (xcodegen + SPM resolve)
        if: steps.guard.outputs.bootstrapped == 'true'
        run: |
          brew install xcodegen
          just bootstrap

      - name: Lint, build, test (incl. macOS compile-validate)
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
