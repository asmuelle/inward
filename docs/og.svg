<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- full-bleed paper background -->
  <rect width="1200" height="630" fill="#F6F2E9"/>

  <!-- subtle on-brand atmosphere: faint indigo washes + laid-paper rule lines -->
  <defs>
    <radialGradient id="wash1" cx="16%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#3B3A6B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3B3A6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash2" cx="90%" cy="14%" r="50%">
      <stop offset="0%" stop-color="#6C6BA6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#6C6BA6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#wash1)"/>
  <rect width="1200" height="630" fill="url(#wash2)"/>

  <!-- thin framing rule, generous margins -->
  <rect x="56" y="56" width="1088" height="518" rx="22" fill="none" stroke="#D8D0BE" stroke-width="2"/>

  <!-- brand mark: dusk-indigo ring with ink stroke + dot -->
  <g transform="translate(120,120)">
    <circle cx="26" cy="26" r="25" fill="none" stroke="#3B3A6B" stroke-width="2.6"/>
    <path d="M26 6 C26 16, 16 16, 16 26 C16 36, 26 36, 26 46" fill="none" stroke="#20211D" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="26" cy="26" r="4.2" fill="#3B3A6B"/>
  </g>
  <text x="190" y="156" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="600" letter-spacing="0.5" fill="#20211D">Inward</text>

  <!-- app name, large serif -->
  <text x="118" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="118" font-weight="400" letter-spacing="-2" fill="#20211D">Inward</text>

  <!-- indigo waveform-to-text motif beneath the name -->
  <g transform="translate(120,372)">
    <g stroke="#6C6BA6" stroke-width="5" stroke-linecap="round">
      <line x1="0"   y1="0"  x2="0"   y2="0"/>
      <line x1="20"  y1="-16" x2="20"  y2="16"/>
      <line x1="40"  y1="-30" x2="40"  y2="30"/>
      <line x1="60"  y1="-12" x2="60"  y2="12"/>
      <line x1="80"  y1="-38" x2="80"  y2="38"/>
      <line x1="100" y1="-22" x2="100" y2="22"/>
      <line x1="120" y1="-30" x2="120" y2="30"/>
    </g>
    <line x1="142" y1="0" x2="172" y2="0" stroke="#D8D0BE" stroke-width="3" stroke-dasharray="4 7" stroke-linecap="round"/>
    <g stroke="#3B3A6B" stroke-width="5" stroke-linecap="round">
      <line x1="192" y1="0" x2="430" y2="0"/>
    </g>
  </g>

  <!-- tagline -->
  <text x="120" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-style="italic" fill="#3A3A33">Your thoughts never leave your phone.</text>

  <!-- privacy chip -->
  <g transform="translate(120,492)">
    <rect x="0" y="0" width="468" height="50" rx="25" fill="#E9E7F0" stroke="#D6D3E6" stroke-width="1.5"/>
    <circle cx="30" cy="25" r="6" fill="#3B3A6B"/>
    <text x="52" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="23" fill="#3B3A6B">On-device · Airplane-mode private</text>
  </g>
</svg>
