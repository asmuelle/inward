name: Inward
options:
  bundleIdPrefix: app.inward
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  InwardCore:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  Inward:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: InwardCore
        products:
          - DesignSystem
          - SafetyKit
          - JournalStore
          - JournalStoreSQLCipher
          - CaptureKit
          - PrivacyKit
          - ReflectKit
          - RecallKit
          - PaywallKit
          - QuickCaptureKit
          - InsightKit
      # The widget/Control Center extension is iOS-only; embed it only in iOS
      # builds so the macOS app (which has no widget) still links cleanly.
      - target: InwardWidgets
        platformFilter: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.inward.Inward
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Inward listens only while you record. Audio is transcribed on this phone and never leaves it."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Transcription happens on this phone."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Inward can use Face ID so only you can open your journal."
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        # iPhone + iPad; macOS ignores this key.
        TARGETED_DEVICE_FAMILY: "1,2"
        # App Sandbox + mic + user-selected file access, macOS SDK only — iOS
        # signing is unaffected (it has no entitlements file).
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": App/Inward-macOS.entitlements
        "INFOPLIST_KEY_LSApplicationCategoryType[sdk=macosx*]": public.app-category.healthcare-fitness
        # GRDB/SQLCipher ships as a dynamic framework embedded in the app. The
        # multiplatform target carries the iOS runpath (@executable_path/Frameworks);
        # on macOS the binary sits in Contents/MacOS, so the framework in
        # Contents/Frameworks is only found via @executable_path/../Frameworks.
        # Without this the app crashes at launch ("can't be opened") loading GRDB.
        "LD_RUNPATH_SEARCH_PATHS[sdk=macosx*]": [$(inherited), "@executable_path/../Frameworks"]

  InwardWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "26.0"
    sources:
      - App/Widgets
    dependencies:
      - package: InwardCore
        products:
          - QuickCaptureKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.inward.Inward.Widgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Widgets/Info.plist
        CODE_SIGN_STYLE: Automatic

  InwardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: Inward

schemes:
  Inward:
    build:
      targets:
        Inward: all
    test:
      gatherCoverageData: true
      storeKitConfiguration: App/Tests/Inward.storekit
      targets:
        - InwardTests
